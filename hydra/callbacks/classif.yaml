model_checkpoint:
  _target_: pytorch_lightning.callbacks.ModelCheckpoint
  monitor: "validation_losses/total_loss" # name of the logged metric which determines when model is improving
  mode: "min" # "max" means higher metric value is better, can be also "min"
  save_top_k: 2 # save k best models (determined by above metric)
  save_last: True # additionaly always save model from last epoch
  verbose: True
  dirpath: ${work_dir}/checkpoints/${name}/${run_id}/
  filename: "epoch_{epoch:03d}_val_total_loss={validation_losses/total_loss:.8f}"
  auto_insert_metric_name: False

model_checkpoint_every_10:
  _target_: pytorch_lightning.callbacks.ModelCheckpoint
  every_n_epochs: 10
  save_top_k: -1 # save k best models (determined by above metric)
  verbose: True
  dirpath: ${work_dir}/checkpoints/${name}/${run_id}/
  filename: "epoch_{epoch:03d}_val_total_loss={validation_losses/total_loss:.8f}"
  auto_insert_metric_name: False

early_stopping:
  _target_: pytorch_lightning.callbacks.EarlyStopping
  monitor: "validation_losses/total_loss" # name of the logged metric which determines when model is improving
  mode: "min" # "max" means higher metric value is better, can be also "min"
  patience: 10 # how many validation epochs of not improving until training stops
  min_delta: 0 # minimum change in the monitored metric needed to qualify as an improvement

lr_monitor:
  _target_ : pytorch_lightning.callbacks.LearningRateMonitor

image_callback:
  _target_: deep_tree.callbacks.show_results_sits_classif.DeepTreeSITSCallbackClassif
  save_dir: ${work_dir}/visualisation/${name}/${run_id}
  n_samples: 5
  n_sits_img: 8
  show_no_veg: true
